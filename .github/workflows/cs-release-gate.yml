# contain-security fork: promote integration -> main on a new upstream release.
# Detects the latest upstream FINAL release tag (vX.Y.Z, no pre-release suffix).
# A release is promotable when (a) integration is actually ahead of main and
# (b) we have not already promoted for it (tracked by a durable cs-promoted/<ver>
# fork tag). When promotable, validates the integration line and opens an
# integration -> main PR with auto-merge (lands once required checks pass).
#
# The cs-promoted/<ver> marker is written by the companion cs-release-mark.yml
# workflow when the PR actually merges -- never here. Auto-merge is asynchronous,
# so stamping it at PR-open time would mark a release done before it lands and a
# rejected promotion would never be retried. Stamping post-merge means an
# un-landed promotion is simply re-attempted at the next gate run.
#
# Why a fork tag instead of ancestry: upstream release tags are cut on release
# branches, so the release commit is never reachable from main. Testing whether
# "main contains the release commit" is therefore always false and cannot be
# used to decide that a release has already been promoted.
name: cs-release-gate

on:
  schedule:
    - cron: "37 */6 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Promote even if main already contains the latest release"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: cs-release-gate
  cancel-in-progress: false

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.detect.outputs.tag }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0
      - name: Detect promotable upstream release
        id: detect
        env:
          FORCE: ${{ inputs.force }}
        run: |
          set -euo pipefail
          git remote add upstream https://github.com/openbao/openbao.git || true
          git fetch --tags --force upstream main
          # Need the fork's integration line for the divergence check below.
          git fetch --force origin integration:refs/remotes/origin/integration

          latest="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n1)"
          echo "latest upstream final release: ${latest:-<none>}"
          if [ -z "$latest" ]; then
            echo "no upstream release tags found; nothing to promote"
            echo "tag=" >> "$GITHUB_OUTPUT"; exit 0
          fi

          # Nothing to promote unless integration is actually ahead of main.
          # Guards against opening an empty PR (integration == main -> no diff).
          ahead="$(git rev-list --count origin/main..origin/integration)"
          if [ "$ahead" -eq 0 ]; then
            echo "integration is not ahead of main; nothing to promote"
            echo "tag=" >> "$GITHUB_OUTPUT"; exit 0
          fi

          # Release-cadence idempotency: cs-promoted/<ver> records that we have
          # already promoted main for this upstream release. (Ancestry of the
          # release commit cannot be used -- see the file header.)
          if [ "$FORCE" != "true" ] && \
             git ls-remote --exit-code origin "refs/tags/cs-promoted/$latest" >/dev/null 2>&1; then
            echo "already promoted for $latest (cs-promoted/$latest exists); nothing to promote"
            echo "tag=" >> "$GITHUB_OUTPUT"; exit 0
          fi

          echo "promotable: $latest (integration is $ahead commit(s) ahead of main)"
          echo "tag=$latest" >> "$GITHUB_OUTPUT"

  validate:
    needs: detect
    if: needs.detect.outputs.tag != ''
    uses: ./.github/workflows/cs-validate.reusable.yml
    with:
      ref: integration

  promote:
    needs: [detect, validate]
    if: needs.detect.outputs.tag != ''
    runs-on: ubuntu-latest
    steps:
      - name: Mint App token
        id: app
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.CS_APP_ID }}
          private-key: ${{ secrets.CS_APP_PRIVATE_KEY }}
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ steps.app.outputs.token }}
      - name: Open release PR and enable auto-merge
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
          TAG: ${{ needs.detect.outputs.tag }}
        run: |
          set -euo pipefail
          body="Automated promotion of the integration line for upstream release ${TAG}. Auto-merges once required checks pass."
          # Capture (don't discard) the create error; an existing open PR is the
          # common reason create fails, so fall back to reusing it.
          url="$(gh pr create --base main --head integration \
            --title "Release ${TAG}: promote integration to main" \
            --body "$body" 2>pr-create.err)" || true
          if [ -z "$url" ]; then
            url="$(gh pr list --base main --head integration --state open --json url --jq '.[0].url')"
          fi
          if [ -z "$url" ]; then
            echo "::error::could not create or find an integration->main PR" >&2
            cat pr-create.err >&2 || true
            exit 1
          fi
          echo "PR: $url"
          # Re-affirming auto-merge on an already-open PR is a no-op, so a slow
          # merge that spans several gate runs is harmless. The cs-promoted marker
          # is written by cs-release-mark.yml once this PR merges.
          gh pr merge "$url" --auto --merge
