# contain-security fork: Go vulnerability scanning (govulncheck).
# Reports reachable known vulnerabilities (call-graph aware) into code scanning.
# Non-blocking on main (alerts only); see results under Security > Code scanning.
name: cs-govulncheck

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "23 6 * * 1" # weekly, catches new CVEs in unchanged code
  workflow_dispatch: {}

permissions:
  contents: read
  security-events: write # upload SARIF to code scanning

concurrency:
  group: cs-govulncheck-${{ github.ref }}
  cancel-in-progress: true

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: .go-version
      - name: Run govulncheck (SARIF)
        env:
          GOTOOLCHAIN: auto
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          # Do not fail the job on findings; surface them as code-scanning alerts.
          govulncheck -format sarif ./... > govulncheck.sarif || true
      - uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          sarif_file: govulncheck.sarif
          category: govulncheck
